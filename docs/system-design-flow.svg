<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1120" role="img" aria-labelledby="title desc">
  <title id="title">LeetCode-style platform system design flow</title>
  <desc id="desc">Clients access a horizontally scalable API layer. Problem browsing uses Redis caching and PostgreSQL. Code submissions are validated, stored as queued records, and sent through a job queue to judge workers. Workers execute code in hardened language-specific sandboxes using hidden test cases. Results are persisted and published to status delivery and leaderboard services, which update clients through WebSocket or server-sent events.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; }
      .heading { font-size: 27px; font-weight: 700; fill: #ffffff; }
      .subtitle { font-size: 16px; font-weight: 500; fill: #c7d2fe; }
      .label { font-size: 19px; font-weight: 700; fill: #0f172a; }
      .copy { font-size: 15px; font-weight: 500; fill: #334155; }
      .small { font-size: 14px; font-weight: 600; fill: #475569; }
      .pill { font-size: 14px; font-weight: 700; fill: #3730a3; }
      .arrow { fill: none; stroke: #475569; stroke-width: 3; marker-end: url(#arrow); }
      .return { fill: none; stroke: #4f46e5; stroke-width: 3; stroke-dasharray: 8 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="720" height="1120" rx="24" fill="#f8fafc"/>

  <rect x="20" y="20" width="680" height="94" rx="18" fill="#312e81"/>
  <text x="360" y="58" text-anchor="middle" class="heading">LeetCode-Style System Design</text>
  <text x="360" y="88" text-anchor="middle" class="subtitle">Conceptual submission, judging, and leaderboard architecture</text>

  <rect x="150" y="142" width="420" height="80" rx="16" fill="#ffffff" stroke="#818cf8" stroke-width="2"/>
  <text x="360" y="175" text-anchor="middle" class="label">Web &amp; Mobile Clients</text>
  <text x="360" y="201" text-anchor="middle" class="copy">Browse problems · submit code · follow contests</text>

  <path d="M360 222 L360 258" class="arrow"/>

  <rect x="40" y="260" width="640" height="106" rx="16" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="360" y="296" text-anchor="middle" class="label">Horizontally Scalable API Layer</text>
  <text x="360" y="325" text-anchor="middle" class="copy">Problem Service · Submission Service · contest validation</text>
  <text x="360" y="351" text-anchor="middle" class="small">Rate limits · payload validation · stateless API instances</text>

  <path d="M245 366 L245 406" class="arrow"/>
  <path d="M475 366 L475 406" class="arrow"/>

  <rect x="40" y="408" width="310" height="154" rx="16" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
  <text x="195" y="443" text-anchor="middle" class="label">Problem Browsing</text>
  <text x="195" y="472" text-anchor="middle" class="copy">Problem metadata and templates</text>
  <text x="195" y="498" text-anchor="middle" class="copy">Redis hot-data cache</text>
  <line x1="68" y1="518" x2="322" y2="518" stroke="#a7f3d0" stroke-width="2"/>
  <text x="195" y="546" text-anchor="middle" class="small">PostgreSQL durable source</text>

  <rect x="370" y="408" width="310" height="154" rx="16" fill="#ffffff" stroke="#f97316" stroke-width="2"/>
  <text x="525" y="443" text-anchor="middle" class="label">Submission Intake</text>
  <text x="525" y="472" text-anchor="middle" class="copy">Validate language and size</text>
  <text x="525" y="498" text-anchor="middle" class="copy">Store submission as QUEUED</text>
  <line x1="398" y1="518" x2="652" y2="518" stroke="#fed7aa" stroke-width="2"/>
  <text x="525" y="546" text-anchor="middle" class="small">Source reference + metadata</text>

  <path d="M525 562 L525 596 L360 596 L360 618" class="arrow"/>

  <rect x="150" y="620" width="420" height="82" rx="16" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="360" y="653" text-anchor="middle" class="label">Submission Job Queue</text>
  <text x="360" y="680" text-anchor="middle" class="copy">Kafka, RabbitMQ, or SQS absorbs contest bursts</text>

  <path d="M360 702 L360 738" class="arrow"/>

  <rect x="40" y="740" width="640" height="112" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="360" y="776" text-anchor="middle" class="label">Judge Worker Pool</text>
  <text x="360" y="805" text-anchor="middle" class="copy">Docker workers for the MVP · Kubernetes orchestration at scale</text>
  <rect x="153" y="820" width="414" height="24" rx="12" fill="#bfdbfe"/>
  <text x="360" y="837" text-anchor="middle" class="pill">Autoscale by queue depth, CPU, and job age</text>

  <path d="M360 852 L360 888" class="arrow"/>

  <rect x="40" y="890" width="640" height="112" rx="16" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="360" y="926" text-anchor="middle" class="label">Hardened Language Sandbox</text>
  <text x="360" y="955" text-anchor="middle" class="copy">Compile and execute against server-side hidden test cases</text>
  <text x="360" y="982" text-anchor="middle" class="small">CPU · memory · timeout · no network · read-only base · cleanup</text>

  <path d="M360 1002 L360 1032" class="arrow"/>

  <rect x="40" y="1034" width="300" height="66" rx="16" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="190" y="1062" text-anchor="middle" class="label">Persist Result</text>
  <text x="190" y="1087" text-anchor="middle" class="copy">Verdict and metrics → PostgreSQL</text>

  <rect x="380" y="1034" width="300" height="66" rx="16" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="530" y="1062" text-anchor="middle" class="label">Publish Result Event</text>
  <text x="530" y="1087" text-anchor="middle" class="copy">WebSocket/SSE + Redis leaderboard</text>

  <path d="M340 1067 L380 1067" class="arrow"/>
  <path d="M680 1067 L700 1067 L700 182 L570 182" class="return"/>
</svg>
